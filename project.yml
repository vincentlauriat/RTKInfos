name: RTKInfos
options:
  bundleIdPrefix: app.rtk-ai
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    from: 0.16.0

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: Info.plist

targets:
  RTKInfos:
    type: application
    platform: macOS
    sources:
      - RTKInfos
      - Sources/RTKCore
    info:
      path: Info.plist
    dependencies:
      - package: SQLite.swift
        product: SQLite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rtk-ai.RTKInfos
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: RTKInfos/RTKInfos.entitlements
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: YES
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: ""  # Fill in your Apple Developer Team ID
          CODE_SIGN_IDENTITY: "Developer ID Application"

  RTKInfosTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - RTKInfosTests
    dependencies:
      - target: RTKInfos
      - package: SQLite.swift
        product: SQLite
