name: RTKInfos
options:
  bundleIdPrefix: app.rtk-ai
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    from: 0.16.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: Info.plist

targets:
  RTKInfos:
    type: application
    platform: macOS
    sources:
      - RTKInfos
      - Sources/RTKCore
    # NB: pas de section `info:` ici — elle ferait régénérer Info.plist par xcodegen
    # (versions par défaut 1.0/1, clés Sparkle perdues). On utilise le Info.plist
    # source maintenu à la main via INFOPLIST_FILE (settings.base).
    dependencies:
      - package: SQLite.swift
        product: SQLite
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rtk-ai.RTKInfos
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Hardened Runtime is applied at codesign time in scripts/build-release.sh
        # (workaround for macOS Sequoia com.apple.provenance xattr issue)
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: RTKInfos/RTKInfos.entitlements
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: YES
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: ""  # Fill in your Apple Developer Team ID
          CODE_SIGN_IDENTITY: "Developer ID Application"

  RTKInfosTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - RTKInfosTests
    dependencies:
      - target: RTKInfos
      - package: SQLite.swift
        product: SQLite
