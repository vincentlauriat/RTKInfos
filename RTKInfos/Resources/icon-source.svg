  <!-- Subtle graph line in bottom area -->
  <polyline
    points="85,810 240,727 393,752 547,615 700,580 940,495"
    fill="none"
    stroke="rgba(255,149,0,0.18)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Graph dots -->
  <circle cx="240" cy="727" r="17" fill="rgba(255,149,0,0.22)"/>
  <circle cx="547" cy="615" r="17" fill="rgba(255,149,0,0.22)"/>
  <circle cx="940" cy="495" r="17" fill="rgba(255,149,0,0.22)"/>

  <!-- Lightning bolt -->
  <path d="M582 154 L342 512 L487 512 L444 854 L700 444 L538 444 Z" fill="url(#bolt)"/>
